<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кампании поддержки</title>
<meta name="description" content="Кампании по отправке обращений в защиту политзаключённых.">
<meta name="robots" content="index,follow">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#e4534b">
<style>
:root{
  --bg:#ffffff; --fg:#1f2328; --muted:#5b636b; --line:#e5e8eb;
  --gray-bg:#f4f5f6; --gray-bd:#c8ccd1;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#15181c; --fg:#e6e8ea; --muted:#a2a9b0; --line:#2a2f36;
    --gray-bg:#20242a; --gray-bd:#3a414a;
  }
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--fg);
  font:400 18px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
  overflow-wrap:break-word;
}
.wrap{max-width:640px;margin:0 auto;padding:48px 20px 80px}
h1{font-size:1.55rem;line-height:1.25;margin:0 0 .3em;font-weight:800;letter-spacing:-.01em}
.lead{color:var(--muted);margin:0 0 1.6em}
.card{
  display:flex;gap:16px;align-items:center;text-decoration:none;color:inherit;
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:.8em 0;
  background:var(--bg)
}
.card:hover,.card:focus-visible{border-color:var(--gray-bd);background:var(--gray-bg);outline:none}
.card img{width:60px;height:76px;object-fit:cover;object-position:center 22%;border-radius:8px;flex:0 0 auto;display:block}
.card .body{min-width:0}
.card .t{display:block;font-weight:700;font-size:1.06rem;margin-bottom:.2em}
.card .d{display:block;color:var(--muted);font-size:.94rem;line-height:1.45}
.card .arrow{margin-left:auto;color:var(--muted);font-size:1.3em;flex:0 0 auto}
</style>
</head>
<body>
<main class="wrap">
<h1>Кампании поддержки</h1>
<p class="lead">Кампании по отправке обращений в защиту политзаключённых.</p>
<a class="card" href="find-trofimov/">
  <img src="find-trofimov/assets/cover.jpg" alt="Андрей Трофимов" loading="lazy">
  <span class="body">
    <span class="t">🆘 Помогите найти Андрея Трофимова</span>
    <span class="d">Активист и политзаключённый; с апреля 2026 года не выходит на связь из ИК-9 в Карелии.</span>
  </span>
  <span class="arrow" aria-hidden="true">→</span>
</a>
</main>
</body>
</html>
